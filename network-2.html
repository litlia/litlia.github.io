<html lang="en">
<head>

<title>Little Ice Age — Sermon Network</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:  #111111;
    --dark:   #1a1a1a;
    --panel:  #161616;
    --border: #2a2a2a;
    --red:    #8b1a1a;
    --red-lt: #b52222;
    --grey1:  #888888;
    --grey2:  #555555;
    --text:   #cccccc;
    --white:  #f0f0f0;
    /* ── rgba helpers ── */
    --card-bg:    rgba(17,17,17,0.93);
    --card-hover: rgba(26,26,26,0.97);
    --ctx-bg:     rgba(17,17,17,0.88);
    --overlay-bg: rgba(8,0,0,0.30);
    --mark-bg:    rgba(139,26,26,.32);
    --mark-text:  #e07070;
    --legend-bg:  rgba(22,22,22,.92);
    --edge-normal: #222;
    --edge-sermon: #8b1a1a;
    --edge-bible:  #2e2e2e;
  }

  [data-theme="light"] {
    --black:  #f2ede4;
    --dark:   #e6e0d5;
    --panel:  #ede8df;
    --border: #b8b0a0;
    --red:    #8b1a1a;
    --red-lt: #9e1f1f;
    --grey1:  #444444;
    --grey2:  #666666;
    --text:   #1a1a1a;
    --white:  #111111;
    --card-bg:    rgba(242,237,228,0.95);
    --card-hover: rgba(230,224,213,0.98);
    --ctx-bg:     rgba(242,237,228,0.92);
    --overlay-bg: rgba(255,250,240,0.15);
    --mark-bg:    rgba(139,26,26,.18);
    --mark-text:  #6a1a1a;
    --legend-bg:  rgba(235,229,218,.95);
    --edge-normal: #ccc;
    --edge-sermon: #8b1a1a;
    --edge-bible:  #aaa;
  }
  html, body {
    height: 100vh; background: var(--black); color: var(--text);
    font-family: Georgia, serif;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    flex-shrink: 0; height: 52px; background: var(--dark);
    border-bottom: 2px solid var(--red);
    display: flex; align-items: center; padding: 0 24px; gap: 12px;
  }
  header h1 { font-size: 1rem; font-weight: normal; letter-spacing: .12em; text-transform: uppercase; color: var(--white); }
  header .sub { font-size: .8rem; color: var(--grey1); font-style: italic; }
  header .back {
    margin-left: auto; font-size: .75rem; color: var(--grey2);
    font-family: 'Courier New', monospace; letter-spacing: .07em;
    text-transform: uppercase; text-decoration: none; transition: color .15s;
  }
  header .back:hover { color: var(--red-lt); }

  #network { flex: 1; position: relative; overflow: hidden; }

  /* Canvas sits behind SVG; both fill the network div */
  #edge-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #graph {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: block; cursor: grab; background: transparent;
  }
  #graph:active { cursor: grabbing; }

  /* Nodes only in SVG */
  .node circle { cursor: pointer; }
  .node.sermon circle { fill: #8b1a1a; stroke: #c43030; stroke-width: 1.5; }
  .node.bible  circle { fill: #3e3e3e; stroke: #777;    stroke-width: 1; }
  [data-theme="light"] .node.bible circle { fill: #c0bbb0; stroke: #888; }
  [data-theme="light"] .dot.bible { background: #c0bbb0; border-color: #888; }
  .node.dimmed     circle { opacity: 0.1; }
  .node.highlighted circle { stroke: var(--white); stroke-width: 2.5; }

  /* Tooltip */
  #tooltip {
    position: absolute; background: var(--panel);
    border: 1px solid var(--border); border-left: 3px solid var(--red);
    padding: .45rem .85rem; font-family: 'Courier New', monospace;
    font-size: .72rem; color: var(--text); pointer-events: none;
    opacity: 0; transition: opacity .1s; max-width: 300px;
    letter-spacing: .04em; line-height: 1.55; z-index: 10;
  }
  #tooltip .tt-type  { font-size: .6rem; text-transform: uppercase; letter-spacing: .14em; color: var(--grey2); margin-bottom: .18rem; }
  #tooltip .tt-name  { color: var(--white); }
  #tooltip .tt-count { color: var(--red-lt); margin-top: .12rem; }
  #tooltip .tt-hint  { color: var(--grey2); font-size: .62rem; margin-top: .25rem; }

  /* Bible card panel */
  #bible-card {
    position: absolute; top: 0; right: 0; bottom: 0; width: 340px;
    background: var(--panel); border-left: 3px solid var(--red);
    padding: 1.4rem 1.3rem 1.4rem 1.4rem;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(.22,.68,0,1.2);
    overflow-y: auto; z-index: 30;
    display: flex; flex-direction: column; gap: 1rem;
  }
  #bible-card.open { transform: translateX(0); }
  #bible-card::-webkit-scrollbar { width: 5px; }
  #bible-card::-webkit-scrollbar-track { background: transparent; }
  #bible-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #card-close {
    position: absolute; top: .8rem; right: .9rem;
    background: none; border: none; color: var(--grey2);
    font-size: 1.1rem; cursor: pointer; transition: color .15s;
  }
  #card-close:hover { color: var(--red-lt); }
  #card-type  { font-family: 'Courier New', monospace; font-size: .6rem; text-transform: uppercase; letter-spacing: .16em; color: var(--red-lt); }
  #card-title { font-size: 1.05rem; color: var(--white); letter-spacing: .04em; line-height: 1.3; }
  #card-subtitle { font-family: 'Courier New', monospace; font-size: .68rem; color: var(--grey2); letter-spacing: .09em; }
  #card-body { font-size: .88rem; color: var(--text); line-height: 1.75; font-style: italic; border-top: 1px solid var(--border); padding-top: .9rem; }
  #card-body.loading { color: var(--grey2); font-style: normal; }
  #card-body ul { list-style: none; display: flex; flex-direction: column; gap: .4rem; font-style: normal; }
  #card-body ul li {
    font-family: 'Courier New', monospace; font-size: .72rem; color: var(--text);
    letter-spacing: .05em; padding: .3rem .5rem;
    background: var(--dark); border-left: 2px solid var(--red);
    cursor: pointer; transition: border-color .12s, color .12s;
  }
  #card-body ul li:hover { border-color: var(--red-lt); color: var(--white); }

  .spinner {
    display: inline-block; width: .8em; height: .8em;
    border: 2px solid var(--border); border-top-color: var(--red-lt);
    border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #legend {
    position: absolute; bottom: 1.1rem; left: 1.1rem;
    background: var(--legend-bg); border: 1px solid var(--border);
    padding: .55rem .85rem; font-family: 'Courier New', monospace;
    font-size: .67rem; color: var(--grey2); letter-spacing: .08em;
    line-height: 1.9; pointer-events: none; display: none;
  }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
  .dot.sermon { background: #8b1a1a; border: 1px solid #c43030; }
  .dot.bible  { background: #3e3e3e; border: 1px solid #777; }

  #stats {
    position: absolute; top: .8rem; right: 1.1rem;
    font-family: 'Courier New', monospace; font-size: .65rem;
    color: var(--grey2); letter-spacing: .09em; pointer-events: none;
  }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; font-size: .78rem;
    letter-spacing: .18em; text-transform: uppercase; color: var(--grey2);
  }
</style>
<script>
(function(){
  var t=localStorage.getItem('litlia-theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
  document.documentElement.setAttribute('data-theme',t);
  document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('theme-toggle');if(b)b.textContent=t==='light'?'☽':'☀';});
})();
</script>

const BOOK_MAP = {
  'genesis':'genesis','gen':'genesis',
  'exodus':'exodus','ex':'exodus','exod':'exodus',

  'revelation':'revelation','rev':'revelation',
};

function bibleUrl(ref) {
  const clean = ref.trim().replace(/:\d+.*$/, '');
  const i = clean.lastIndexOf(' ');
  if (i === -1) return null;
  const slug = BOOK_MAP[clean.slice(0, i).toLowerCase().trim()];
  const ch   = clean.slice(i + 1).trim();
  if (!slug || !/^\d+$/.test(ch)) return null;
  return `https://cdn.jsdelivr.net/gh/wldeh/bible-api/bibles/en-kjv/books/${slug}/chapters/${ch}.json`;
}

function extractText(json) {
  if (json?.data && Array.isArray(json.data)) return json.data.map(v => v.text || '').join(' ');
  if (Array.isArray(json)) return json.map(v => v.text || '').join(' ');
  return (json?.chapter?.verses || json?.verses || []).map(v => v.text || '').join(' ');
}

/* ══════════════════════════════════════════════
   Bible card
══════════════════════════════════════════════ */
const card      = document.getElementById('bible-card');
const cardType  = document.getElementById('card-type');
const cardTitle = document.getElementById('card-title');
const cardSub   = document.getElementById('card-subtitle');
const cardBody  = document.getElementById('card-body');
document.getElementById('card-close').addEventListener('click', () => card.classList.remove('open'));

function openBibleCard(ref) {
  cardType.textContent = 'Bible passage';
  cardTitle.textContent = ref;
  cardSub.textContent = '';
  cardBody.className = 'loading';
  cardBody.innerHTML = '<span class="spinner"></span> loading passage…';
  card.classList.add('open');
  const url = bibleUrl(ref);
  if (!url) { cardBody.className = ''; cardBody.textContent = '(not resolvable in KJV database)'; return; }
  fetch(url).then(r => r.json()).then(data => {
    let text = extractText(data);
    cardBody.className = '';
    cardBody.innerHTML = `<p>${text || '(no text found)'}</p>`;
  }).catch(() => { cardBody.className = ''; cardBody.textContent = '(could not load passage)'; });
}

function openSermonCard(id, passages) {
  cardType.textContent = 'Sermon';
  cardTitle.textContent = id;
  cardSub.textContent = `${passages.length} passage${passages.length !== 1 ? 's' : ''} cited`;
  cardBody.className = '';
  const ul = document.createElement('ul');
  passages.forEach(p => {
    const li = document.createElement('li');
    li.textContent = p;
    li.addEventListener('click', () => openBibleCard(p));
    ul.appendChild(li);
  });
  cardBody.innerHTML = '';
  cardBody.appendChild(ul);
  card.classList.add('open');
}

: "2 Samuel 24"}, {"Source": "1705-graefe-gottes-majestaet-und", "Target": "Esther 2"}, {"Source": "1705-graefe-gottes-majestaet-und", "Target": "2 Samuel 11"}, {"Source": "1705-graefe-gottes-majestaet-und", "Target": "1 Samuel 7"}, {"Source": "1705-graefe-gottes-majestaet-und", "Target": "2 Cor 4"}, {"Source": "1705-graefe-gottes-majestaet-und", "Target": "1 Cor 10"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "Jer 3:22"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Cor 4"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "Ps 86"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Cor 8"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Kings 6"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Samuel 22"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Cor 10"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Cor 1"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "John 1"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Kings 14"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Chronicles 22"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "Ezek 32"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Cor 3"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Chronicles 6"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Kings 17"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Kings 3"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Cor 2"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Kings 2"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "Job 1"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Cor 4"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "Col 1"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Samuel 2"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Tim 2"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Thess 5"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Thess 1"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Kings 19"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Tim 2"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Samuel 9"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Samuel 16"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "Ezek 57"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Kings 6"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Chronicles 3"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Samuel 11"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "1 Kings 5"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Samuel 1"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Samuel 21"}, {"Source": "1707-stolle-el-lemoshaot-der", "Target": "2 Tim 4"}, {"Source": "1748-knebel-wie-gott-denen", "Target": "Mark 7:31"}, {"Source": "1748-knebel-wie-gott-denen", "Target": "Job 33:15"}, {"Source": "1748-knebel-wie-gott-denen", "Target": "Mark 7:3"}, {"Source": "1748-knebel-wie-gott-denen", "Target": "Job 33:17"}];
  Promise.resolve(raw).then(raw => {

    /* ── 1. Parse ── */
    const edgeSet = new Set(), links = [];
    const sermonIds = new Set(), bibleIds = new Set();
    const sermonPassages = {};

    raw.forEach(row => {
      const src = row.Source.trim(), tgt = row.Target.trim();
      if (!src || !tgt) return;
      const key = src + '|||' + tgt;
      if (edgeSet.has(key)) return;
      edgeSet.add(key);
      sermonIds.add(src); bibleIds.add(tgt);
      links.push({ source: src, target: tgt });
      (sermonPassages[src] = sermonPassages[src] || []).push(tgt);
    });

    /* ── 2. In-degree ── */
    const inDeg = {};
    links.forEach(l => { inDeg[l.target] = (inDeg[l.target] || 0) + 1; });

    /* ── 3. Nodes ── */
    const SERMON_R = 14;
    const nodes = [];
    sermonIds.forEach(id => nodes.push({ id, type: 'sermon', deg: 0 }));
    bibleIds.forEach(id  => nodes.push({ id, type: 'bible',  deg: inDeg[id] || 0 }));

    const maxDeg = d3.max(nodes, d => d.deg) || 1;
    const bibleR = d3.scaleSqrt().domain([1, maxDeg]).range([2, 20]);
    const nodeR  = d => d.type === 'sermon' ? SERMON_R : bibleR(Math.max(d.deg, 1));

    /* ── 4. Zoom state ── */
    let tx = d3.zoomIdentity;
    let hoveredId = null;

    /* ── 5. Canvas edge drawing ── */
    function drawEdges() {
      const cs=getComputedStyle(document.documentElement);
      const cEdgeNormal=cs.getPropertyValue('--edge-normal').trim()||'#222';
      const cEdgeSermon=cs.getPropertyValue('--edge-sermon').trim()||'#8b1a1a';
      const cEdgeBible =cs.getPropertyValue('--edge-bible').trim() ||'#2e2e2e';
      const ctx = canvas.getContext('2d');
      const cw = canvas.width, ch = canvas.height;
      ctx.clearRect(0, 0, cw, ch);
      ctx.save();
      ctx.translate(tx.x, tx.y);
      ctx.scale(tx.k, tx.k);

      const lw = 1 / tx.k;

      if (hoveredId) {
        /* Dimmed edges first */
        ctx.beginPath();
        ctx.strokeStyle = cEdgeNormal;
        ctx.lineWidth = lw;
        ctx.globalAlpha = 0.08;
        links.forEach(l => {
          if (nid(l.source) !== hoveredId && nid(l.target) !== hoveredId) {
            ctx.moveTo(l.source.x, l.source.y);
            ctx.lineTo(l.target.x, l.target.y);
          }
        });
        ctx.stroke();
        /* Highlighted edges */
        ctx.beginPath();
        ctx.strokeStyle = cEdgeSermon;
        ctx.lineWidth = 1.4 / tx.k;
        ctx.globalAlpha = 0.8;
        links.forEach(l => {
          if (nid(l.source) === hoveredId || nid(l.target) === hoveredId) {
            ctx.moveTo(l.source.x, l.source.y);
            ctx.lineTo(l.target.x, l.target.y);
          }
        });
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.strokeStyle = cEdgeBible;
        ctx.lineWidth = lw;
        ctx.globalAlpha = 0.55;
        links.forEach(l => {
          ctx.moveTo(l.source.x, l.source.y);
          ctx.lineTo(l.target.x, l.target.y);
        });
        ctx.stroke();
      }
      ctx.restore();
    }

    function nid(n) { return typeof n === 'object' ? n.id : n; }
    window.addEventListener('litlia-theme', function(){ drawEdges(); });

    /* ── 6. SVG zoom ── */
    const g = svg.append('g');
    svg.call(
      d3.zoom().scaleExtent([0.05, 14]).on('zoom', e => {
        tx = e.transform;
        g.attr('transform', tx);
        drawEdges();
      })
    );

    /* ── 7. Force simulation — Yifan-Hu-like spread ── */
    const sim = d3.forceSimulation(nodes)
      .force('link',      d3.forceLink(links).id(d => d.id).distance(80).strength(0.35))
      .force('charge',    d3.forceManyBody().strength(-450).distanceMax(700))
      .force('center',    d3.forceCenter(W() / 2, H() / 2))
      .force('collision', d3.forceCollide().radius(d => nodeR(d) + 6).strength(0.9))
      .stop();

    // 120 synchronous warmup ticks → good initial spread before animation
    for (let i = 0; i < 120; i++) sim.tick();
    sim.restart();

    /* ── 8. Node rendering ── */
    const nodeSel = g.append('g')
      .selectAll('g').data(nodes).join('g')
      .attr('class', d => 'node ' + d.type)
      .call(
        d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    nodeSel.append('circle').attr('r', nodeR);

    /* ── 9. Adjacency ── */
    /* draw initial positions immediately (before first tick) */
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    drawEdges();
    const neighbors = {};
    links.forEach(l => {
      const s = nid(l.source), t = nid(l.target);
      (neighbors[s] = neighbors[s] || new Set()).add(t);
      (neighbors[t] = neighbors[t] || new Set()).add(s);
    });

    /* ── 10. Hover & click ── */
    const tooltip = d3.select('#tooltip');

    nodeSel
      .on('mouseover', (event, d) => {
        hoveredId = d.id;
        const nb = neighbors[d.id] || new Set();

        tooltip.style('opacity', 1).html(
          `<div class="tt-type">${d.type === 'sermon' ? 'Sermon' : 'Bible passage'}</div>` +
          `<div class="tt-name">${d.id}</div>` +
          (d.type === 'bible'
            ? `<div class="tt-count">${d.deg} sermon${d.deg !== 1 ? 's' : ''}</div>`
            : `<div class="tt-count">${nb.size} passage${nb.size !== 1 ? 's' : ''} cited</div>`) +
          `<div class="tt-hint">click to read</div>`
        );

        nodeSel.classed('dimmed',      n => n.id !== d.id && !nb.has(n.id));
        nodeSel.classed('highlighted', n => n.id === d.id || nb.has(n.id));
        drawEdges();
        positionTooltip(event);
      })
      .on('mousemove', positionTooltip)
      .on('mouseout', () => {
        hoveredId = null;
        tooltip.style('opacity', 0);
        nodeSel.classed('dimmed', false).classed('highlighted', false);
        drawEdges();
      })
      .on('click', (event, d) => {
        event.stopPropagation();
        d.type === 'bible'
          ? openBibleCard(d.id)
          : openSermonCard(d.id, sermonPassages[d.id] || []);
      });

    svg.on('click', () => card.classList.remove('open'));

    function positionTooltip(event) {
      const [mx, my] = d3.pointer(event, network);
      const nx = mx + 340 < W() ? mx + 14 : mx - 244;
      const ny = Math.max(4, Math.min(my - 20, H() - 90));
      tooltip.style('left', nx + 'px').style('top', ny + 'px');
    }

    /* ── 11. Simulation tick ── */
    sim.on('tick', () => {
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
      drawEdges();
    });

    /* ── 12. UI ── */
    document.getElementById('loading').style.display = 'none';
    document.getElementById('legend').style.display  = 'block';
    document.getElementById('stats').innerHTML =
      `${sermonIds.size} sermons &middot; ${bibleIds.size} passages &middot; ${links.length} edges`;

  }).catch(err => {
    document.getElementById('loading').textContent = 'Error loading data.';
    console.error(err);
  });
})();
</script>

function toggleTheme(){
  var next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('litlia-theme',next);
  var b=document.getElementById('theme-toggle');if(b)b.textContent=next==='light'?'☽':'☀';
  window.dispatchEvent(new Event('litlia-theme'));
}
</script>
