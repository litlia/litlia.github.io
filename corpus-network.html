<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Little Ice Age — Corpus Network</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:  #111111;
    --dark:   #1a1a1a;
    --panel:  #161616;
    --border: #2a2a2a;
    --red:    #8b1a1a;
    --red-lt: #b52222;
    --grey1:  #888888;
    --grey2:  #555555;
    --text:   #cccccc;
    --white:  #f0f0f0;
    --blue-lt:#3a7ab8;
    --amber-lt:#c4881a;
  }
  html, body {
    height: 100vh; background: var(--black); color: var(--text);
    font-family: Georgia, serif;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    flex-shrink: 0; height: 52px; background: var(--dark);
    border-bottom: 2px solid var(--red);
    display: flex; align-items: center; padding: 0 24px; gap: 12px;
  }
  header h1 { font-size: 1rem; font-weight: normal; letter-spacing: .12em; text-transform: uppercase; color: var(--white); }
  header .sub { font-size: .8rem; color: var(--grey1); font-style: italic; }
  header .back {
    margin-left: auto; font-size: .75rem; color: var(--grey2);
    font-family: 'Courier New', monospace; letter-spacing: .07em;
    text-transform: uppercase; text-decoration: none; transition: color .15s;
  }
  header .back:hover { color: var(--red-lt); }

  #network { flex: 1; position: relative; overflow: hidden; }

  #edge-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #graph {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: block; cursor: grab; background: transparent;
  }
  #graph:active { cursor: grabbing; }

  .node circle  { cursor: pointer; }
  .node.Predigt     circle { fill: #8b1a1a; stroke: #c43030; stroke-width: 2; }
  .node.Bibelstelle circle { fill: #1a4a7a; stroke: #3a7ab8; stroke-width: 1; }
  .node.Wetter      circle { fill: #6a3e0c; stroke: #c4881a; stroke-width: 1.5; }
  .node.dimmed      circle { opacity: 0.08; }
  .node.dimmed      svg    { opacity: 0.08; }
  .node.highlighted circle { stroke: var(--white) !important; stroke-width: 2.5 !important; }

  #tooltip {
    position: absolute; background: var(--panel);
    border: 1px solid var(--border); border-left: 3px solid var(--red);
    padding: .45rem .85rem; font-family: 'Courier New', monospace;
    font-size: .72rem; color: var(--text); pointer-events: none;
    opacity: 0; transition: opacity .1s; max-width: 280px;
    letter-spacing: .04em; line-height: 1.55; z-index: 10;
  }
  #tooltip .tt-type  { font-size: .6rem; text-transform: uppercase; letter-spacing: .14em; margin-bottom: .15rem; }
  #tooltip .tt-type.Predigt     { color: #c43030; }
  #tooltip .tt-type.Bibelstelle { color: var(--blue-lt); }
  #tooltip .tt-type.Wetter      { color: var(--amber-lt); }
  #tooltip .tt-name  { color: var(--white); }
  #tooltip .tt-count { color: var(--grey2); margin-top: .12rem; font-size: .65rem; }

  #legend {
    position: absolute; bottom: 1.1rem; left: 1.1rem;
    background: rgba(22,22,22,.92); border: 1px solid var(--border);
    padding: .6rem .9rem; font-family: 'Courier New', monospace;
    font-size: .67rem; color: var(--grey2); letter-spacing: .08em;
    line-height: 2; pointer-events: none; display: none;
  }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .dot.Predigt     { background: #8b1a1a; border: 1.5px solid #c43030; }
  .dot.Bibelstelle { background: #1a4a7a; border: 1px solid #3a7ab8; }
  .dot.Wetter      { background: #6a3e0c; border: 1.5px solid #c4881a; }

  #stats {
    position: absolute; top: .8rem; right: 1.1rem;
    font-family: 'Courier New', monospace; font-size: .65rem;
    color: var(--grey2); letter-spacing: .09em; pointer-events: none;
  }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; font-size: .78rem;
    letter-spacing: .18em; text-transform: uppercase; color: var(--grey2);
  }
</style>
</head>
<body>

<header>
  <h1>Little Ice Age</h1>

</div>

/* Build a weather icon SVG element via DOMParser (cross-browser safe) */
function makeWetterIcon(id, r) {
  const key  = WETTER_ICON[id] || 'cloud';
  const size = r * 1.3;
  const half = size / 2;
  const xmlStr = [
    '<svg xmlns="http://www.w3.org/2000/svg"',
    ' viewBox="0 0 20 20"',
    ' width="' + size + '" height="' + size + '"',
    ' x="' + (-half) + '" y="' + (-half) + '"',
    ' fill="none"',
    ' stroke="rgba(255,220,140,0.9)"',
    ' stroke-width="2"',
    ' stroke-linecap="round"',
    ' stroke-linejoin="round">',
    ICON_SVG[key] || ICON_SVG.cloud,
    '</svg>',
  ].join('');
  const parser = new DOMParser();
  const doc    = parser.parseFromString(xmlStr, 'image/svg+xml');
  return document.importNode(doc.documentElement, true);
}

ource": "Ps 29", "Target": "Donner", "Type": "Undirected", "Weight": "1"}, {"Source": "Ps 68", "Target": "Donner", "Type": "Undirected", "Weight": "1"}, {"Source": "Ps 77", "Target": "Blitz", "Type": "Undirected", "Weight": "1"}, {"Source": "Ps 77", "Target": "Donner", "Type": "Undirected", "Weight": "1"}, {"Source": "Ps 77", "Target": "Regen", "Type": "Undirected", "Weight": "1"}, {"Source": "Ps 78", "Target": "Hagel", "Type": "Undirected", "Weight": "1"}, {"Source": "Ps 78", "Target": "Schlossen", "Type": "Undirected", "Weight": "1"}, {"Source": "Sir 40", "Target": "Feuer", "Type": "Undirected", "Weight": "1"}, {"Source": "Sir 40", "Target": "Flut", "Type": "Undirected", "Weight": "1"}, {"Source": "Sir 40", "Target": "Hagel", "Type": "Undirected", "Weight": "1"}, {"Source": "Spr 1", "Target": "Sturm", "Type": "Undirected", "Weight": "1"}, {"Source": "Spr 1", "Target": "Wetter", "Type": "Undirected", "Weight": "1"}, {"Source": "Weish 5", "Target": "Hagel", "Type": "Undirected", "Weight": "1"}, {"Source": "Zeph 1", "Target": "Ungestüm", "Type": "Undirected", "Weight": "1"}, {"Source": "Zeph 1", "Target": "Wetter", "Type": "Undirected", "Weight": "1"}];

  Promise.resolve([nodesRaw, edgesRaw]).then(function (results) {
    var nodesRaw = results[0], edgesRaw = results[1];

    /* ── 1. Node map ── */
    var nodeMap = {};
    nodesRaw.forEach(function (r) {
      var id = r.Id.trim();
      nodeMap[id] = { id: id, label: r.Label.trim(), type: r.Type.trim(), deg: 0 };
    });

    /* ── 2. Edges & degree ── */
    var links = [];
    edgesRaw.forEach(function (r) {
      var s = r.Source.trim(), t = r.Target.trim();
      if (!nodeMap[s] || !nodeMap[t]) return;
      links.push({ source: s, target: t });
      nodeMap[s].deg++;
      nodeMap[t].deg++;
    });

    var nodes = Object.values(nodeMap);

    /* ── 3. Radius scales ── */
    var maxDP = d3.max(nodes.filter(function(n){return n.type==='Predigt';}),     function(n){return n.deg;}) || 1;
    var maxDB = d3.max(nodes.filter(function(n){return n.type==='Bibelstelle';}), function(n){return n.deg;}) || 1;
    var maxDW = d3.max(nodes.filter(function(n){return n.type==='Wetter';}),      function(n){return n.deg;}) || 1;

    var rP = d3.scaleSqrt().domain([1, maxDP]).range([12, 22]);
    var rB = d3.scaleSqrt().domain([1, maxDB]).range([4,  13]);
    var rW = d3.scaleSqrt().domain([1, maxDW]).range([12, 18]);

    function nodeR(d) {
      var deg = Math.max(d.deg, 1);
      if (d.type === 'Predigt')     return rP(deg);
      if (d.type === 'Bibelstelle') return rB(deg);
      return rW(deg);
    }

    /* ── 4. Adjacency (built from string IDs before sim resolution) ── */
    var neighbors = {};
    links.forEach(function (l) {
      var s = l.source, t = l.target;
      if (!neighbors[s]) neighbors[s] = new Set();
      if (!neighbors[t]) neighbors[t] = new Set();
      neighbors[s].add(t);
      neighbors[t].add(s);
    });

    /* ── 5. State ── */
    var tx = d3.zoomIdentity;
    var hoveredId = null;

    /* ── 6. Canvas edge drawing — assigned to outer drawEdges ── */
    drawEdges = function () {
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(tx.x, tx.y);
      ctx.scale(tx.k, tx.k);
      var lw = 1 / tx.k;

      if (hoveredId) {
        ctx.beginPath();
        ctx.strokeStyle = '#1e1e1e';
        ctx.lineWidth   = lw;
        ctx.globalAlpha = 0.07;
        links.forEach(function (l) {
          if (nid(l.source) !== hoveredId && nid(l.target) !== hoveredId) {
            ctx.moveTo(l.source.x, l.source.y);
            ctx.lineTo(l.target.x, l.target.y);
          }
        });
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = '#999';
        ctx.lineWidth   = 1.3 / tx.k;
        ctx.globalAlpha = 0.7;
        links.forEach(function (l) {
          if (nid(l.source) === hoveredId || nid(l.target) === hoveredId) {
            ctx.moveTo(l.source.x, l.source.y);
            ctx.lineTo(l.target.x, l.target.y);
          }
        });
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.strokeStyle = '#2e2e2e';
        ctx.lineWidth   = lw;
        ctx.globalAlpha = 0.65;
        links.forEach(function (l) {
          ctx.moveTo(l.source.x, l.source.y);
          ctx.lineTo(l.target.x, l.target.y);
        });
        ctx.stroke();
      }
      ctx.restore();
    };

    /* ── 7. Zoom ── */
    var g = svgEl.append('g');
    svgEl.call(
      d3.zoom().scaleExtent([0.04, 16]).on('zoom', function (e) {
        tx = e.transform;
        g.attr('transform', tx);
        drawEdges();
      })
    );

    /* ── 8. Simulation ── */
    var sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(function (d) { return d.id; })
        .distance(function (d) {
          var st = (typeof d.source === 'object' ? d.source.type : '') || '';
          var tt = (typeof d.target === 'object' ? d.target.type : '') || '';
          return (st === 'Predigt' || tt === 'Predigt') ? 95 : 55;
        })
        .strength(0.4))
      .force('charge',    d3.forceManyBody().strength(-300).distanceMax(600))
      .force('center',    d3.forceCenter(W() / 2, H() / 2))
      .force('collision', d3.forceCollide().radius(function (d) { return nodeR(d) + 5; }).strength(0.85))
      .stop();

    /* Synchronous warmup for good initial spread */
    for (var i = 0; i < 120; i++) sim.tick();

    /* ── 9. Nodes ── */
    var nodeSel = g.append('g')
      .selectAll('g')
      .data(nodes)
      .join('g')
      .attr('class', function (d) { return 'node ' + d.type; })
      .call(
        d3.drag()
          .on('start', function (e, d) { if (!e.active) sim.alphaTarget(0.15).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag',  function (e, d) { d.fx = e.x; d.fy = e.y; })
          .on('end',   function (e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    nodeSel.append('circle').attr('r', nodeR);

    /* Weather icons via DOMParser */
    nodeSel.filter(function (d) { return d.type === 'Wetter'; })
      .each(function (d) {
        try { this.appendChild(makeWetterIcon(d.id, nodeR(d))); } catch (e) { /* icon optional */ }
      });

    /* Initial render */
    nodeSel.attr('transform', function (d) { return 'translate(' + d.x + ',' + d.y + ')'; });
    drawEdges();

    /* ── 10. Hover ── */
    var tooltip = d3.select('#tooltip');

    nodeSel
      .on('mouseover', function (event, d) {
        hoveredId = d.id;
        var nb = neighbors[d.id] || new Set();
        tooltip.style('opacity', 1).html(
          '<div class="tt-type ' + d.type + '">' + d.type + '</div>' +
          '<div class="tt-name">' + d.label + '</div>' +
          '<div class="tt-count">' + d.deg + ' connection' + (d.deg !== 1 ? 's' : '') + '</div>'
        );
        nodeSel.classed('dimmed',      function (n) { return n.id !== d.id && !nb.has(n.id); });
        nodeSel.classed('highlighted', function (n) { return n.id === d.id || nb.has(n.id); });
        drawEdges();
        positionTooltip(event);
      })
      .on('mousemove', positionTooltip)
      .on('mouseout', function () {
        hoveredId = null;
        tooltip.style('opacity', 0);
        nodeSel.classed('dimmed', false).classed('highlighted', false);
        drawEdges();
      });

    function positionTooltip(event) {
      var pt = d3.pointer(event, network);
      var mx = pt[0], my = pt[1];
      var nx = mx + 300 < W() ? mx + 14 : mx - 214;
      var ny = Math.max(4, Math.min(my - 20, H() - 80));
      tooltip.style('left', nx + 'px').style('top', ny + 'px');
    }

    /* ── 11. Animated tick ── */
    sim.on('tick', function () {
      nodeSel.attr('transform', function (d) { return 'translate(' + d.x + ',' + d.y + ')'; });
      drawEdges();
    });
    sim.restart();

    /* ── 12. UI ── */
    document.getElementById('loading').style.display = 'none';
    document.getElementById('legend').style.display  = 'block';
    var counts = { Predigt: 0, Bibelstelle: 0, Wetter: 0 };
    nodes.forEach(function (n) { if (counts[n.type] !== undefined) counts[n.type]++; });
    document.getElementById('stats').innerHTML =
      counts.Predigt + ' Predigten &middot; ' +
      counts.Bibelstelle + ' Bibelstellen &middot; ' +
      counts.Wetter + ' Wetterdaten &middot; ' +
      links.length + ' Kanten';

  }).catch(function (err) {
    var el = document.getElementById('loading');
    el.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
    console.error(err);
  });
